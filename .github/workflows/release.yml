name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: |
          apt-get update
          apt-get install -y ffmpeg
          python -m pip install --upgrade pytest ruff yt-dlp
      - name: Verify
        run: |
          ruff check .
          ruff format --check .
          pytest
      - name: Build skill bundle
        run: scripts/build-skill.sh
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/watch.skill
          generate_release_notes: true
